        <span class="theme-icon" id="themeIcon">☀️</span>
    </button>

    <div class="lang-selector">
        <button class="lang-btn" id="langBtn" aria-label="Language">🌐 <span id="currentLang">한국어</span></button>
        <div class="lang-dropdown" id="langDropdown" role="menu">
            <button class="lang-option" data-lang="ko" role="menuitem">🇰🇷 한국어</button>
            <button class="lang-option" data-lang="en" role="menuitem">🇺🇸 English</button>
            <button class="lang-option" data-lang="zh" role="menuitem">🇨🇳 中文</button>
            <button class="lang-option" data-lang="hi" role="menuitem">🇮🇳 हिन्दी</button>
            <button class="lang-option" data-lang="ru" role="menuitem">🇷🇺 Русский</button>
            <button class="lang-option" data-lang="ja" role="menuitem">🇯🇵 日本語</button>
            <button class="lang-option" data-lang="es" role="menuitem">🇪🇸 Español</button>
            <button class="lang-option" data-lang="pt" role="menuitem">🇧🇷 Português</button>
            <button class="lang-option" data-lang="id" role="menuitem">🇮🇩 Indonesia</button>
            <button class="lang-option" data-lang="tr" role="menuitem">🇹🇷 Türkçe</button>
            <button class="lang-option" data-lang="de" role="menuitem">🇩🇪 Deutsch</button>
            <button class="lang-option" data-lang="fr" role="menuitem">🇫🇷 Français</button>
        </div>
    </div>

    <main id="main-content">
        <header>
            <h1 class="app-title" data-i18n="app.title">😢 Emotional Age Test</h1>
            <p class="app-subtitle" data-i18n="app.subtitle">How old is your heart?</p>
        </header>

        <div class="container">
            <!-- Start Screen -->
            <section id="startScreen" class="card" aria-label="Start">
                <div class="start-content">
                    <div class="aura-orb">
                        <div class="orb-inner">😢</div>
                    </div>
                    <p class="start-desc" data-i18n="app.description">Drag the slider between two reactions across 10 emotional scenarios to discover your true emotional age.</p>
                    <button class="btn btn-start" id="startBtn" data-i18n="app.start">Discover My Emotional Age</button>
                </div>
            </section>

            <!-- Quiz Screen (Scenario Slider) -->
            <section id="quizScreen" style="display:none;" aria-label="Quiz">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                    <span class="progress-text" id="progressText">1 / 10</span>
                </div>
                <div class="card question-card" id="questionCard">
                    <div class="scenario-emoji" id="scenarioEmoji">🎯</div>
                    <h2 class="scenario-text" id="scenarioText"></h2>
                    <div class="slider-container" id="sliderContainer">
                        <div class="slider-labels">
                            <span class="slider-label slider-label-left" id="labelLeft"></span>
                            <span class="slider-label slider-label-right" id="labelRight"></span>
                        </div>
                        <div class="slider-track-wrapper">
                            <input type="range" min="0" max="100" value="50" class="scenario-slider" id="scenarioSlider" aria-label="Reaction slider">
                            <div class="slider-value-indicator" id="sliderValueIndicator">50</div>
                        </div>
                    </div>
                    <button class="btn btn-next" id="nextBtn" data-i18n="quiz.next">Next</button>
                </div>
            </section>

            <!-- Result Screen -->
            <section id="resultScreen" style="display:none;" aria-label="Result">
                <div class="card result-card" id="resultCard">
                    <div class="result-tier-badge" id="tierBadge"></div>
                    <div class="emotional-age-display">
                        <div class="age-number" id="ageNumber">0</div>
                        <div class="age-label" data-i18n="result.yearsOld">years old</div>
                    </div>
                    <h2 class="result-tier-name" id="tierName"></h2>
                    <p class="result-tier-desc" id="tierDesc"></p>

                    <div class="spectrum-bar-container" id="spectrumContainer">
                        <div class="spectrum-bar">
                            <div class="spectrum-marker" id="spectrumMarker"></div>
                        </div>
                        <div class="spectrum-labels">
                            <span class="spectrum-label" data-i18n="result.spectrumLeft">Reactive</span>
                            <span class="spectrum-label" data-i18n="result.spectrumRight">Wise</span>
                        </div>
                    </div>

                    <div class="share-section">
                        <h3 data-i18n="share.title">Share Your Result</h3>
                        <div class="share-buttons">
                            <button class="btn btn-share btn-twitter" id="shareTwitter" data-i18n="share.twitter">Share on X</button>
                            <button class="btn btn-share btn-copy" id="shareCopy" data-i18n="share.copyUrl">Copy Link</button>
                        </div>
                    </div>

                    <button class="btn btn-retake" id="retakeBtn" data-i18n="result.retake">Retake Test</button>
                </div>
            </section>
        </div>
    </main>

    <footer>
